# Lokaal echte SMTP zonder internet: docker compose up -d (Mailpit zit in docker-compose.yml)
# Start backend met: --spring.profiles.active=mailpit
# Inbox: http://localhost:8025
spring.config.activate.on-profile=mailpit
app.mail.smtp-enabled=true
app.mail.smtp-host=127.0.0.1
app.mail.smtp-port=1025
app.mail.smtp-user=
app.mail.smtp-password=
app.mail.smtp-starttls=false
app.mail.smtp-auth=false
