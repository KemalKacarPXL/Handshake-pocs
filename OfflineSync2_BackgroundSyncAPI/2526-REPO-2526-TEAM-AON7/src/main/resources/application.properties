spring.application.name=researchproject
server.address=0.0.0.0

# Optioneel: kopieer env.mail.example naar .env en vul aan (wordt niet gecommit).
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/aon_db
spring.datasource.username=aon_user
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.security=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Publieke URL van de frontend (voor uitnodigingslinks in e-mail als de client geen inviteLink meestuurt)
app.frontend.base-url=http://localhost:5173

# --- Echte e-mail (SMTP) ---
# Zet MAIL_SMTP_ENABLED=true en de andere MAIL_SMTP_* variabelen (zie env.mail.example), of start met
# profiel mailpit + Docker: docker compose up -d (Mailpit draait mee op poort 1025 / UI 8025)
#   ./gradlew bootRun --args='--spring.profiles.active=mailpit'
# Inbox testen: http://localhost:8025
# Zonder SMTP: MAIL_SMTP_ENABLED ontbreekt of false → console-mailer (alleen log, geen echte mail).
app.mail.smtp-enabled=${MAIL_SMTP_ENABLED:false}
app.mail.smtp-host=${MAIL_SMTP_HOST:}
app.mail.smtp-port=${MAIL_SMTP_PORT:587}
app.mail.smtp-user=${MAIL_SMTP_USER:}
app.mail.smtp-password=${MAIL_SMTP_PASSWORD:}
app.mail.smtp-starttls=${MAIL_SMTP_STARTTLS:true}
app.mail.smtp-auth=${MAIL_SMTP_AUTH:true}
